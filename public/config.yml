backend:
  name: github
  repo: Momminess/momminess-cms-data
  branch: master
  use_graphql: false
publish_mode: editorial_workflow
i18n:
  structure: multiple_folders
  locales:
    - hu
    - en
  default_locale: hu
site_url: 'https://www.momminess.com'
media_folder: public/media/uploads
public_folder: /media/uploads
logo:
  src: 'https://momminess.com/assets/assets/images/title_color.svg'
  show_in_header: true
locale: hu
show_preview_links: false
search: true
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'
collections:
  - name: author
    label: Szerzők
    label_singular: Szerző
    i18n: true
    folder: content/authors
    create: true
    extension: md
    editor:
      preview: false
    format: frontmatter
    identifier_field: name
    slug: '{{fields.id}}'
    fields:
      - name: id
        label: Id
        widget: string
        i18n: false
        hint: 'Pl: vasvari-viki'
        pattern:
          - '^[a-z0-9-]+$'
          - 'Csak kisbetű, szám és kötőjel'
      - name: photo
        label: Fotó
        widget: image
      - name: name
        label: Név
        widget: string
        i18n: true
      - name: occupation
        label: Foglalkozás
        widget: string
        i18n: true
      - name: website
        label: Honlap
        widget: string
      - name: socials
        label: Közösségi linkek
        widget: list
        required: false
        fields:
          - label: Platform
            name: platform
            widget: select
            options:
              - label: Tiktok
                value: tiktok
              - label: Instagram
                value: instagram
              - label: YouTube
                value: youtube
              - label: Facebook
                value: facebook
              - label: LinkedIn
                value: linkedin
              - label: X
                value: x
              - label: Website
                value: website
          - label: URL
            name: url
            widget: string
      - name: description
        label: Bemutatkozás
        widget: text
        i18n: true
      - label: Kapcsolódó
        name: related
        widget: list
        i18n: true
        fields:
          - label: Megnevezés
            name: name
            widget: string
            hint: 'Pl: Csolnoky Ferenc Kórház'
          - label: Leírás
            name: description
            widget: text
            hint: 'Pl: Itt dolgoztam 10 évet.'
          - label: Link
            name: link
            widget: string
            required: false
            hint: 'Pl: https://csfk.hu/'
      - label: Jellemzők
        name: details
        widget: list
        i18n: true
        fields:
          - label: Jellemző neve
            name: name
            widget: string
            hint: 'Pl: Levezetett szülések száma'
          - label: Jellemző értéke
            name: result
            widget: text
            hint: 'Pl: 1000'
          - label: Link
            name: link
            widget: string
            required: false
      - label: Eredmények
        name: achievements
        widget: list
        i18n: true
        fields:
          - label: Neve
            name: name
            widget: string
            hint: 'Pl: Szülésznő verseny 2025'
          - label: Elért eredmény
            name: result
            widget: text
            hint: 'Pl: 1. helyezés'
          - label: Link
            name: link
            widget: string
            required: false
  - name: cta
    label: Felhívások
    label_singular: Felhívás
    i18n: true
    folder: content/cta
    create: true
    extension: md
    editor:
      preview: false
    format: frontmatter
    slug: '{{fields.id}}'
    fields:
      - name: id
        label: Id
        widget: string
        i18n: false
        hint: 'Pl: cta-weekly-tips'
        pattern:
          - '^[a-z0-9-]+$'
          - 'Csak kisbetű, szám és kötőjel'
      - name: title
        label: Cím
        widget: string
        i18n: true
        hint: 'Pl: Heti tippekkért töltsd le az alkamazásunkat!'
      - name: description
        label: Leírás
        widget: text
        i18n: true
        hint: >-
          Pl: Minden héten új, szakértői tippek várnak az alkalmazásunkban, hogy
          támogassuk a családtervezési utadat. Ne maradj le róluk!
      - name: placement
        label: Elhelyezés
        widget: select
        hint: Hol jelenjen meg ez a felhívás?
        options:
          - label: Elején
            value: begin
          - label: Cikkben
            value: inline
          - label: Végén
            value: end
          - label: Oldalt
            value: sidebar
        required: false
        default: end
      - name: primary
        label: Primary CTA
        hint: >-
          Ez a fő cselekvésre ösztönző gomb lesz a felhívásban, ezért ennek
          kitöltése kötelező.
        widget: object
        i18n: true
        fields:
          - name: type
            label: Típus
            widget: select
            hint: Milyen típusú legyen a gomb?
            options:
              - label: Regisztráció
                value: register
              - label: Alkalmazás telepítése
                value: app_install
              - label: Email feliratkozás
                value: email_signup
              - label: Külső link
                value: external
            default: register
            i18n: false
          - name: label
            label: Gomb szövege
            widget: string
            i18n: true
            hint: 'Pl: Regisztrálj most!'
          - name: url
            label: URL
            widget: string
            hint: 'Pl: https://www.momminess.com'
            i18n: true
          - name: android_url
            label: Android URL
            widget: string
            hint: 'Pl: https://play.google.com/store/apps/details?id=com.momminess.app'
            i18n: true
            required: false
          - name: ios_url
            label: IOs URL
            widget: string
            hint: 'Pl: https://www.momminess.com'
            i18n: true
            required: false
          - name: utm
            label: UTM
            widget: string
            required: false
            hint: 'Pl: utm_source=seo&utm_medium=cta&utm_campaign=symtpoms'
            i18n: false
      - name: secondary
        label: Secondary CTA
        widget: object
        required: false
        i18n: true
        hint: >-
          Ez egy másodlagos cselekvésre ösztönző gomb lesz a felhívásban, ezért
          ennek kitöltése nem kötelező. Használhatod például egy kapcsolódó
          tartalomra mutató linkként.
        fields:
          - name: type
            label: Típus
            widget: select
            options:
              - label: Email feliratkozás
                value: email_signup
              - label: Lead magnet
                value: lead_magnet
              - label: Külső link
                value: external
              - label: Nincs
                value: none
            default: lead_magnet
            i18n: false
          - name: label
            label: Link szövege
            widget: string
            i18n: true
            required: false
            hint: 'Pl: Töltsd le a családi költségvetés sablonunkat!'
          - name: lead_magnet_key
            label: Lead magnet key
            widget: string
            required: false
            hint: 'Pl: finance-template'
            i18n: false
          - name: url
            label: URL
            widget: string
            required: false
            i18n: false
            hint: 'Pl: /landing/finance-template'
  - name: article
    label: Cikkek
    label_singular: Cikk
    view_groups:
      - label: Kategória
        field: category
    i18n: true
    folder: content/knowledge
    create: true
    publish_mode: editorial_workflow
    extension: md
    editor:
      preview: false
    format: frontmatter
    slug: '{{fields.id}}'
    fields:
      - name: id
        label: Id
        widget: string
        i18n: false
        hint: 'Pl: cta-weekly-tips'
        pattern:
          - '^[a-z0-9-]+$'
          - 'Csak kisbetű, szám és kötőjel'
      - name: slug
        label: Slug
        widget: string
        i18n: true
        hint: 'Pl: barnazas-9-het'
        pattern:
          - '^[a-z0-9-]+$'
          - 'Csak kisbetű, szám és kötőjel'
      - name: canonical
        label: Canonical URL
        widget: string
        required: false
        hint: 'Ha máshol is létezik ez a tartalom, add meg a teljes URL-t'
      - name: noindex
        label: Ne indexelje
        hint: >-
          Jelöld be, ha nem szeretnéd, hogy ez a cikk megjelenjen a Google
          keresési találatai között. Ez akkor lehet hasznos, ha a tartalom
          nagyon specifikus, vagy ha még nem készült el teljesen.
        widget: boolean
        required: false
        default: false
      - name: author
        label: Szerző
        widget: relation
        collection: author
        search_fields:
          - id
          - name
        display_fields:
          - name
        value_field: id
      - name: category
        label: Kategória
        widget: select
        options:
          - label: 'Családtervezés'
            value: 'family_planning/other'
          - label: 'Családtervezés / Termékenység és ovuláció'
            value: 'family_planning/fertility_and_ovulation'
          - label: 'Családtervezés / Egészséges életmód'
            value: 'family_planning/healthy_lifestyle'
          - label: 'Családtervezés / Párkapcsolati felkészülés'
            value: 'family_planning/relationship_preparation'
          - label: 'Családtervezés / Genetikai és szűrővizsgálatok'
            value: 'family_planning/genetic_and_screening_tests'
          - label: 'Családtervezés / Pénzügyi tervezés'
            value: 'family_planning/financial_planning'
          - label: 'Családtervezés / Fogamzásgátlás'
            value: 'family_planning/contraception'
          - label: 'Családtervezés / Gyógyszerek'
            value: 'family_planning/family_planning_medications'
          - label: 'Családtervezés / Táplálékkiegészítők'
            value: 'family_planning/supplements'
          - label: 'Családtervezés / Javasolt vizsgálatok'
            value: 'family_planning/recommended_examinations'
          - label: 'Várandós vagyok'
            value: 'im_pregnant/other'
          - label: 'Várandós vagyok / Első trimeszter'
            value: 'im_pregnant/first_trimester'
          - label: 'Várandós vagyok / Második trimeszter'
            value: 'im_pregnant/second_trimester'
          - label: 'Várandós vagyok / Harmadik trimeszter'
            value: 'im_pregnant/third_trimester'
          - label: 'Várandós vagyok / Táplálkozás és életmód'
            value: 'im_pregnant/nutrition_and_lifestyle'
          - label: 'Várandós vagyok / Szülésre felkészülés'
            value: 'im_pregnant/birth_preparation'
          - label: 'Várandós vagyok / Eszközök'
            value: 'im_pregnant/tools'
          - label: 'Várandós vagyok / Gyógyszerek'
            value: 'im_pregnant/pregnancy_medications'
          - label: 'Várandós vagyok / Genetikai tesztek'
            value: 'im_pregnant/genetic_tests'
          - label: 'Várandós vagyok / Kötelező vizsgálatok'
            value: 'im_pregnant/mandatory_examinations'
          - label: 'Várandós vagyok / Választható vizsgálatok'
            value: 'im_pregnant/optional_examinations'
          - label: 'Várandós vagyok / Várandósság alatti kórképek'
            value: 'im_pregnant/pregnancy_conditions'
          - label: 'Várandós vagyok / Érdekességek'
            value: 'im_pregnant/interesting_facts'
          - label: 'Meddőség'
            value: 'infertility/other'
          - label: 'Meddőség / Diagnosztika'
            value: 'infertility/diagnostics'
          - label: 'Meddőség / Kezelési lehetőségek (hormonkezelés, IVF)'
            value: 'infertility/treatment_options'
          - label: 'Meddőség / Lelki támogatás'
            value: 'infertility/emotional_support'
          - label: 'Meddőség / Támogató szakemberek és közösségek'
            value: 'infertility/support_experts_and_communities'
          - label: 'Meddőség / Meddőséget okozó betegségek'
            value: 'infertility/infertility_causing_diseases'
          - label: 'Gyermek 0-1 éves korig'
            value: 'child_age_0_to_1/other'
          - label: 'Gyermek 0-1 éves korig / Újszülöttgondozás'
            value: 'child_age_0_to_1/newborn_care'
          - label: 'Gyermek 0-1 éves korig / Táplálás (szoptatás, hozzátáplálás)'
            value: 'child_age_0_to_1/feeding'
          - label: 'Gyermek 0-1 éves korig / Alvás és altatás'
            value: 'child_age_0_to_1/child_age_0_to_1_sleep_and_bedtime'
          - label: 'Gyermek 0-1 éves korig / Egészség, védőoltások'
            value: 'child_age_0_to_1/health_and_vaccinations'
          - label: 'Gyermek 0-1 éves korig / Gyógyszerek'
            value: 'child_age_0_to_1/child_age_0_to_1_medications'
          - label: 'Gyermek 0-1 éves korig / Anya-gyermek kapcsolat kialakítása'
            value: 'child_age_0_to_1/mother_child_bonding'
          - label: 'Gyermek 0-1 éves korig / Szülés utáni depresszió'
            value: 'child_age_0_to_1/postpartum_depression'
          - label: 'Gyermek 0-1 éves korig / Szülés utáni regeneráció'
            value: 'child_age_0_to_1/postpartum_recovery'
          - label: 'Gyermek 1-3 éves korig'
            value: 'child_age_1_to_3/other'
          - label: 'Gyermek 1-3 éves korig / Beszéd- és mozgásfejlődés'
            value: 'child_age_1_to_3/speech_and_motor_development'
          - label: 'Gyermek 1-3 éves korig / Étkezés'
            value: 'child_age_1_to_3/eating'
          - label: 'Gyermek 1-3 éves korig / Viselkedés és nevelési kérdések'
            value: 'child_age_1_to_3/behavior_and_parenting'
          - label: 'Gyermek 1-3 éves korig / Szobatisztaság'
            value: 'child_age_1_to_3/potty_training'
          - label: 'Gyermek 1-3 éves korig / Bölcsődei/óvodai beszoktatás'
            value: 'child_age_1_to_3/nursery_kindergarten_acclimation'
          - label: 'Gyermek 1-3 éves korig / Alvás és altatás'
            value: 'child_age_1_to_3/child_age_1_to_3_sleep_and_bedtime'
          - label: 'Gyermek 1-3 éves korig / Gyógyszerek'
            value: 'child_age_1_to_3/child_age_1_to_3_medications'
          - label: 'Érdeklődő vagyok'
            value: 'interested/other'
          - label: 'Érdeklődő vagyok / Alapvető információk a gyermekvállalásról'
            value: 'interested/basic_info_on_parenting'
          - label: 'Érdeklődő vagyok / Egészségügyi tudnivalók, szakértői tanácsok'
            value: 'interested/health_and_expert_advice'
          - label: 'Érdeklődő vagyok / Ismeretterjesztő tartalmak'
            value: 'interested/educational_content'
      - name: published_at
        label: Publikálva
        widget: datetime
        default: '{{now}}'
      - name: updated_at
        label: Frissítve
        widget: datetime
        default: '{{now}}'
      - name: title
        label: Cím
        widget: string
        i18n: true
        hint: >-
          A cikk címe. Fontos, hogy tartalmazza a cikk fő kulcsszavait a jobb
          SEO érdekében. Pl: Barnázás a 9. héten: Mitől lehet és mit tehetsz
          ellene? Hossz: 45-60
        pattern: ['^.{45,60}$', "Legalább 45, maximum 60 karakter."]
      - name: summary
        label: Összefoglaló
        hint: >-
          Rövid leírás a cikk tartalmáról, ami megjelenik a cikk listában.
          Indexelés szempontjából fontos, hogy ez a rész tartalmazza a cikk fő
          kulcsszavait. Hossz: 130-150
        widget: text
        i18n: true
        pattern: ['^.{130,150}$', "Legalább 130, maximum 150 karakter."]
      - name: tags
        label: Címkék
        widget: list
        min: 1
        i18n: true
        hint: >-
          Adj meg néhány kulcsszót, amik jellemzik a cikk tartalmát. Ez segíti
          az olvasókat abban, hogy könnyebben megtalálják a számukra releváns
          cikkeket. Pl: barnázás, vérzés, terhesség korai szakasza
      - name: body
        label: Szövegtörsz
        widget: markdown
        hint: A cikk teljes szövege.
        buttons:
          - bold
          - italic
          - link
          - quote
          - heading-two
          - heading-three
          - heading-four
          - heading-five
          - heading-six
          - bulleted-list
          - numbered-list
        editor_components: []
        i18n: true
      - label: Gyakori kérdések
        name: faq
        widget: list
        i18n: true
        hint: >-
          Adj meg néhány gyakori kérdést és választ a cikk témájában. Ez segíti
          az olvasókat abban, hogy gyorsan választ találjanak a leggyakoribb
          kérdésekre, és javítja a cikk SEO-ját is. Pl: Kérdés: Miért pont barna
          színű a folyás? Válasz: A barnás szín általában azt jelzi, hogy a vér
          már régebbi, és nem friss. Ez gyakori a terhesség korai szakaszában,
          amikor a megtermékenyített petesejt beágyazódik a méh falába, és némi
          vérzés kíséri ezt a folyamatot.
        fields:
          - label: Kérdés
            name: question
            widget: string
          - label: Válasz
            name: answer
            widget: text
      - label: Források
        name: sources
        widget: list
        hint: >-
          Adj meg néhány forrást, amik alapján a cikket írtad. Ez növeli a cikk
          hitelességét és segíti az olvasókat abban, hogy tovább mélyüljenek a
          témában, ha szeretnének.
        fields:
          - label: Neve
            name: title
            widget: string
            hint: 'Pl: Terhesvitaminok összehasonlító tesztje 2024'
          - label: Link
            name: url
            widget: string
            hint: 'Pl: https://www.momminess.com/terhesvitamin-teszt'
          - label: Kiadó
            name: publisher
            widget: string
            required: false
            hint: 'Pl: Momminess'
          - label: Megjelenés éve
            name: published_at
            widget: string
            required: false
            hint: 'Pl: 2024'
      - label: Felhívás
        name: cta
        widget: relation
        collection: cta
        hint: >-
          Válaszd ki, hogy melyik felhívás jelenjen meg a cikkben.
        search_fields:
          - id
          - title
        display_fields:
          - title
        value_field: id
